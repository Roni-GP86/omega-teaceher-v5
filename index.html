<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omega Guru: Atasi Beban Administrasi Guru</title>
    <!-- PWA Meta and Links -->
    <meta name="theme-color" content="#d97706" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.jpg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Service Worker for PWA Installation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('PWA Service Worker registered successfully:', reg.scope);
            })
            .catch((err) => {
              console.warn('PWA Service Worker registration failed:', err);
            });
        });
      }

      document.addEventListener('contextmenu', (e) => {
        const tagName = e.target && e.target.tagName ? e.target.tagName.toLowerCase() : '';
        if (tagName === 'input' || tagName === 'textarea') {
          return;
        }
        e.preventDefault();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'F12') {
          e.preventDefault();
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C' || e.key === 'i' || e.key === 'j' || e.key === 'c')) {
          e.preventDefault();
        }
        if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's')) {
          e.preventDefault();
        }
      });

      // SAFETY NET: Auto-Recovery for Service Worker Death Loop (White Screen Bypass)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.src || e.target.href)) {
          console.warn('Resource load failed, checking Service Worker...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (let reg of registrations) {
                reg.unregister();
              }
              console.log('SW unregistered due to load error. Reloading...');
              window.location.reload(true);
            });
          }
        }
      }, true);

      // Check if page stays blank after 4 seconds
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.innerHTML.trim() === '') {
          console.warn('Omega: Page remains blank. Resetting service worker cache...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              if (registrations.length > 0) {
                for (var i = 0; i < registrations.length; i++) {
                  registrations[i].unregister();
                }
                window.location.reload(true);
              }
            });
          }
        }
      }, 4000);
    </script>
  </body>
</html>
