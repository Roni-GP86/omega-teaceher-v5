<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="blueBg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <radialGradient id="neonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    
    <!-- Gold / Premium Metallic Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="30%" stop-color="#facc15" />
      <stop offset="70%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>

    <!-- Vibrant Page Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Premium Deep Blue Cornered Container -->
  <rect width="512" height="512" rx="128" fill="url(#blueBg)" />
  
  <!-- Outer Gold/Cyan Dual-layer Ring Border -->
  <rect width="502" height="502" x="5" y="5" rx="123" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.85" />
  <rect width="492" height="492" x="10" y="10" rx="118" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.4" />

  <!-- Ambient Light/Glow Center -->
  <circle cx="256" cy="256" r="210" fill="url(#neonGlow)" />
  
  <!-- Glowing Circular Orbits -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="10 15" opacity="0.35" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.4" />

  <!-- THE EMBLEM: Luminous Open Education Book (KOSP Curriculum) -->
  <g transform="translate(0, 15)">
    <!-- Book Left Page -->
    <path d="M256 310 C210 270, 140 265, 100 275 L100 175 C140 165, 210 170, 256 210 Z" fill="url(#cyanGrad)" opacity="0.95" />
    <!-- Book Right Page -->
    <path d="M256 310 C302 270, 372 265, 412 275 L412 175 C372 165, 302 170, 256 210 Z" fill="url(#emeraldGrad)" opacity="0.95" />
    
    <!-- Spines of pages (giving thick realistic clean vector pages feeling) -->
    <path d="M256 315 L256 210" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
    
    <!-- Left page accent lines (text lines representing curriculum) -->
    <line x1="130" y1="200" x2="220" y2="215" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    <line x1="125" y1="225" x2="215" y2="240" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    <line x1="135" y1="250" x2="200" y2="260" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6" />

    <!-- Right page accent lines -->
    <line x1="382" y1="200" x2="292" y2="215" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    <line x1="387" y1="225" x2="297" y2="240" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    <line x1="377" y1="250" x2="312" y2="260" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- THE GRADUATION CAP (Puncak Kurikulum Merdeka) on Top of the Book -->
  <g transform="translate(256, 110) scale(0.95)" filter="url(#glow)">
    <!-- Cap Diamond Plane -->
    <path d="M0 -35 L110 0 L0 35 L-110 0 Z" fill="url(#roseGrad)" />
    <!-- Under Cap shadow/cap volume -->
    <path d="M-60 12 L-60 30 C-60 45, 60 45, 60 30 L60 12" fill="#991b1b" />
    <!-- Cap Silk Tassel/Sumpis -->
    <path d="M0 0 L-95 20 L-95 55" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" />
    <circle cx="-95" cy="55" r="7" fill="url(#goldGrad)" />
  </g>

  <!-- SUPER GOLDEN UNLOCK KEY (Pelepas Sandi Excel Utilitas) -->
  <!-- Set frontmost and centered with brilliant neon gold glows -->
  <g transform="translate(256, 305) scale(1.1)" filter="url(#glow)">
    <!-- Key Head (Brilliant Circle Intertwined with Star) -->
    <circle cx="0" cy="-60" r="32" fill="none" stroke="url(#goldGrad)" stroke-width="12" />
    <circle cx="0" cy="-60" r="15" fill="url(#goldGrad)" />
    
    <!-- Key Shaft -->
    <path d="M-6 -28 L6 -28 L6 65 C6 68, -6 68, -6 65 Z" fill="url(#goldGrad)" />
    
    <!-- Glowing Accent Inner core -->
    <path d="M-2 -28 L2 -28 L2 60 L-2 60 Z" fill="#ffffff" opacity="0.7" />

    <!-- Dual Key Teeth / Flag with Excel cut-out shape concept -->
    <path d="M6 15 L32 15 L32 30 L6 30 Z" fill="url(#goldGrad)" />
    <path d="M6 42 L32 42 L32 57 L6 57 Z" fill="url(#goldGrad)" />
    
    <!-- Inner dynamic detailing -->
    <rect x="14" y="20" width="8" height="5" fill="#1e293b" rx="1" />
    <rect x="14" y="47" width="8" height="5" fill="#1e293b" rx="1" />
  </g>

  <!-- Front Sparkles / Scientific Dots (Enhancing Magic/AI/Professional look) -->
  <circle cx="95" cy="115" r="8" fill="url(#goldGrad)" filter="url(#glow)" />
  <circle cx="415" cy="115" r="8" fill="url(#goldGrad)" filter="url(#glow)" />
  <polygon points="380,360 385,372 397,375 385,378 380,390 375,378 363,375 375,372" fill="#38bdf8" filter="url(#glow)" />
  <polygon points="130,360 135,372 147,375 135,378 130,390 125,378 113,375 125,372" fill="#eab308" filter="url(#glow)" />
</svg>
