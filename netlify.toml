[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Perpanjang timeout hingga 26 detik agar AI generation selesai
  timeout = 26

# Redirect semua permintaan API ke Netlify serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Fallback untuk routing Single Page Application (React)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
